[package]
name = "Flint"
version = "0.1.5"
edition = "2024"

[dependencies]
glib = "0.22.8"
pulldown-cmark = "0.13.4"
gtk4 = { version = "0.11.4", features = ["v4_10"] }
rhai = "1.25.1"
serde = "1.0.228"
serde_json = "1.0.150"
notify = "8.2.0"
sourceview5 = "0.11.0"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true
