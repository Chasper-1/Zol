[package]
name = "Flint"
version = "0.1.9"
edition = "2024"

[dependencies]
eframe = "0.31.0"
pulldown-cmark = "0.13.4"
rhai = "1.25.1"
serde = "1.0.228"
serde_json = "1.0.150"
notify = "8.2.0"
pangocairo = "0.22.8"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true
